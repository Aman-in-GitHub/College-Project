services:
  db:
    image: postgres:16
    container_name: college_project_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    ports:
      - "5433:5432"
    volumes:
      - college_postgres_data:/var/lib/postgresql/data
  redis:
    image: redis:8
    container_name: college_project_redis
    ports:
      - "6380:6379"
    volumes:
      - college_redis_data:/data

volumes:
  college_postgres_data:
  college_redis_data:
